<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Auto-TradeBot Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-main: #c5c6c7;
            --text-accent: #66fcf1;
            --green: #45a29e;
            --red: #f44336;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            padding: 40px 20px 20px 20px;
            background: linear-gradient(180deg, rgba(31,40,51,1) 0%, rgba(11,12,16,1) 100%);
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
        }
        .total-value {
            font-size: 42px;
            font-weight: 700;
            margin: 10px 0;
            color: white;
        }
        .container {
            padding: 0 20px 20px 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 600;
            margin: 30px 0 15px 0;
            color: white;
        }
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .symbol {
            font-weight: bold;
            font-size: 18px;
            color: white;
        }
        .value {
            font-weight: 600;
            font-size: 16px;
        }
        .details {
            font-size: 14px;
            color: #aaa;
            line-height: 1.4;
        }
        .ai-reasoning {
            font-size: 14px;
            font-style: italic;
            color: #888;
            margin-top: 8px;
            border-left: 2px solid var(--text-accent);
            padding-left: 10px;
        }
        .pill {
            background-color: rgba(102, 252, 241, 0.1);
            color: var(--text-accent);
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }
        .error {
            color: var(--red);
            text-align: center;
            padding: 20px;
        }
        .spinner {
            text-align: center;
            padding: 40px;
            color: var(--text-accent);
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title">Total Portfolio (Est)</div>
        <div class="total-value" id="total-val">$0.00</div>
        <div style="color: #888; font-size: 12px;" id="last-updated">Last Updated: Loading...</div>
    </div>

    <div class="container">
        
        <div class="section-title">Markets Overview</div>
        <div class="card">
            <div class="details" id="us-summary">Loading US...</div>
        </div>
        <div class="card">
            <div class="details" id="tsx-summary">Loading TSX...</div>
        </div>

        <div class="section-title">Current Holdings</div>
        <div id="holdings-list">
            <div class="spinner">Fetching data...</div>
        </div>

        <div class="section-title">AI Brain (Latest Moves)</div>
        <div id="decisions-list">
            <div class="details">Waiting for data...</div>
        </div>
        
    </div>

    <script>
        function formatMoney(num) {
            return '$' + parseFloat(num).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
        
        function parseHoldings(str, type) {
            if(!str || str === "None" || str === "Error") return [];
            let lines = str.split('\n');
            let items = [];
            for(let line of lines) {
                if(line.trim() === "") continue;
                // e.g. "XOM: 454.0 shares @ Avg Cost $136.17 (Est Value: $62238.86, 6.3%)"
                let parts = line.split(':');
                if(parts.length < 2) continue;
                let symbol = parts[0].trim();
                let rest = parts.slice(1).join(':').trim();
                let estValMatch = rest.match(/Est Value:\s*\$?([\d\.]+)/);
                let estVal = estValMatch ? parseFloat(estValMatch[1]) : 0;
                items.push({ symbol, details: rest, value: estVal, type });
            }
            return items;
        }

        async function loadDashboard() {
            try {
                const response = await fetch(`https://api.github.com/gists/ae8497fb6814f01e75c9e00ccda036ba`);
                if (!response.ok) throw new Error("Failed to fetch data");
                const gistData = await response.json();
                const data = JSON.parse(gistData.files['dashboard.json'].content);

                document.getElementById('last-updated').innerText = "Last Updated: " + new Date(data.last_updated).toLocaleString();
                
                // Summaries
                document.getElementById('us-summary').innerText = data.us_summary || "US Data Unavailable";
                document.getElementById('tsx-summary').innerText = data.tsx_summary || "TSX Data Unavailable";
                
                // Parse total value from summaries
                let totalNet = 0;
                let usMatch = (data.us_summary || "").match(/Net Liquidation:\s*\$?([\d\.]+)/);
                if(usMatch) totalNet += parseFloat(usMatch[1]);
                
                let tsxMatch = (data.tsx_summary || "").match(/Virtual TSX Budget:\s*\$?([\d\.]+)/);
                if(tsxMatch) totalNet += parseFloat(tsxMatch[1]);
                
                document.getElementById('total-val').innerText = formatMoney(totalNet);

                // Holdings
                let holdings = [];
                holdings = holdings.concat(parseHoldings(data.us_positions, 'US'));
                holdings = holdings.concat(parseHoldings(data.tsx_positions, 'TSX'));
                
                // Sort by value descending
                holdings.sort((a, b) => b.value - a.value);
                
                let holdingsHtml = "";
                for(let item of holdings) {
                    holdingsHtml += `
                    <div class="card">
                        <div class="card-header">
                            <span class="symbol">${item.symbol}</span>
                            <span class="value">${formatMoney(item.value)}</span>
                        </div>
                        <div class="details">${item.details}</div>
                    </div>`;
                }
                document.getElementById('holdings-list').innerHTML = holdingsHtml || "<div class='details'>No positions currently held.</div>";

                // Decisions
                let decisionsHtml = "";
                if(data.decisions && data.decisions.length > 0) {
                    for(let d of data.decisions.slice().reverse()) {
                        let isBuy = d.action.toUpperCase() === 'BUY';
                        let color = isBuy ? 'var(--text-accent)' : 'var(--red)';
                        decisionsHtml += `
                        <div class="card">
                            <div class="card-header">
                                <span class="symbol" style="color: ${color}">${d.action} ${d.symbol}</span>
                                <span class="pill">${d.bucket}</span>
                            </div>
                            <div class="details">Target Pct: ${(d.target_portfolio_pct * 100).toFixed(1)}%</div>
                            <div class="ai-reasoning">${d.reasoning}</div>
                        </div>`;
                    }
                } else {
                    decisionsHtml = "<div class='details'>No recent AI decisions.</div>";
                }
                document.getElementById('decisions-list').innerHTML = decisionsHtml;

            } catch (e) {
                console.error(e);
                document.getElementById('holdings-list').innerHTML = `<div class="error">Failed to connect to the bot API. Make sure the bot is running and you are on the same Wi-Fi.</div>`;
            }
        }

        // Auto refresh every 30 seconds
        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
